# =============================================================================================================================
# ENVIRONMENT PROFILE: PRODUCTION (AWS DEPLOYMENT)
# =============================================================================================================================
# This profile encapsulates configuration definitions isolated specifically for production environments.

# =============================================================================================================================
# DATABASE CONFIGURATION (AWS RDS)
# =============================================================================================================================
# Dynamic database connection bindings mapped directly from standard AWS cloud environment parameters
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.username=${RDS_USERNAME}
spring.datasource.password=${RDS_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================================================================
# JPA / HIBERNATE PERSISTENCE MANAGEMENT
# =============================================================================================================================
# 'validate' prevents automatic database schema modifications at runtime to preserve production data integrity
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=false

# =============================================================================================================================
# PRODUCTION RUNTIME STORAGE TIERS (AWS EFS / Persistent Mount)
# =============================================================================================================================
# Dedicated persistent storage mount directory path for uploads on the cloud compute instance
project.image=/var/app/current/scribeapi/uploads/

# =============================================================================================================================
# PRODUCTION PERFORMANCE & SECURITY TRACING LAYERS
# =============================================================================================================================
# Disables direct SQL console logging to maximize execution speed and protect database query privacy
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# High-performance clean logging filters to minimize disk write overhead
logging.level.root=WARN
logging.level.com.shivani.scribeapi=INFO
