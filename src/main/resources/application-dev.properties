# =============================================================================================================================
# ENVIRONMENT PROFILE: DEVELOPMENT (LOCAL)
# =============================================================================================================================
# This profile encapsulates configuration definitions isolated specifically for local development environments.

# =============================================================================================================================
# DATABASE CONFIGURATION
# =============================================================================================================================
# Local MySQL persistence connection string parameters
spring.datasource.url=jdbc:mysql://localhost:3306/scribe_api_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Authority@01
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================================================================
# JPA / HIBERNATE PERSISTENCE MANAGEMENT
# =============================================================================================================================
# Instructs Hibernate to safely synchronize the database schema on local startup sequences
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# =============================================================================================================================
# LOCAL RUNTIME STORAGE TIERS
# =============================================================================================================================
# Direct file path system routing for local multi-part media uploads
project.image=${user.home}/scribeapi/uploads/

# =============================================================================================================================
# DEVELOPMENT LOCAL TRACING LAYERS
# =============================================================================================================================
# Outputs formatted SQL queries directly to the developer console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Fine-grained local logging filters
logging.level.root=INFO
logging.level.com.shivani.scribeapi=DEBUG
