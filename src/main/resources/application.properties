# =============================================================================================================================
# SERVER CONFIGURATION
# =============================================================================================================================
spring.application.name=scribe-api-backend
server.port=8080
spring.profiles.active=dev

# =============================================================================================================================
# DATABASE CONFIGURATION
# =============================================================================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/scribe_api_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Authority@01
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================================================================
# JPA / HIBERNATE CONFIGURATION
# =============================================================================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# =============================================================================================================================
# MULTIPART / FILE UPLOAD CONFIGURATION
# =============================================================================================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Production path separation to isolate media assets from transient project targets
project.image=${user.home}/scribeapi/uploads/

# =============================================================================================================================
# OPENAPI / SWAGGER DOCUMENTATION CONTROLS
# =============================================================================================================================
# Filters default internal framework endpoints out of the clean interactive view
springdoc.packages-to-scan=com.shivani.scribeapi.controller

# =============================================================================================================================
# LOGGING & TRACING LAYERS
# =============================================================================================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
# Fine-grained application packages trace logs
logging.level.com.shivani.scribeapi=DEBUG
# Spring security architecture tracing filters
logging.level.org.springframework.security=INFO
